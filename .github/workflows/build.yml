name: Build Signed Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Signed Release
        run: |
          ./gradlew assembleRelease           -Pandroid.injected.signing.store.file=keystore.jks           -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}           -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}           -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk XDABrowser-1.303.02.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDABrowser-Signed
          path: XDABrowser-1.303.02.apk
